name: Debug IP Logging
on:
  workflow_dispatch:
    inputs:
      test_ip:
        description: 'Test IP address'
        required: true
        default: '192.168.1.1'

jobs:
  debug:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Create test issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const testIp = context.payload.inputs.test_ip;
            
            await github.rest.issues.create({
              owner,
              repo,
              title: `IP Log: ${new Date().toISOString()}`,
              body: `Visitor IP: ${testIp}\n\nUser Agent: Debug Test`,
              labels: ['ip-log']
            });
