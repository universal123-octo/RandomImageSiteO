name: Update IP Logs
on:
  issues:
    types: [opened, labeled]

jobs:
  update-ips:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'ip-log')
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Extract IP from issue
        id: extract
        run: |
          IP=$(echo "${{ github.event.issue.body }}" | grep -oP 'Visitor IP: \K[0-9.]+')
          TIMESTAMP="${{ github.event.issue.title }}"
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          
      - name: Update ips.txt
        run: |
          # Create ips.txt if it doesn't exist
          if [ ! -f ips.txt ]; then
            echo "Timestamp - IP Address" > ips.txt
            echo "----------------------" >> ips.txt
          fi
          
          # Add the new IP
          echo "${{ steps.extract.outputs.timestamp }} - ${{ steps.extract.outputs.ip }}" >> ips.txt
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ips.txt
          git commit -m "Add IP log: ${{ steps.extract.outputs.ip }}"
          git push
          
      - name: Close issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
            
            // Add a comment to the issue
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: 'IP logged successfully. This issue will be closed automatically.'
            });
