name: Update IP Logs
on:
  issues:
    types: [opened]

jobs:
  update-ips:
    runs-on: ubuntu-latest
    if: startsWith(github.event.issue.title, 'IP Log:')
    permissions:
      contents: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Extract IP from issue
        id: extract
        run: |
          IP=$(echo "${{ github.event.issue.body }}" | grep -oP 'Visitor IP: \K[0-9.]+')
          TIMESTAMP="${{ github.event.issue.title }}"
          echo "ip=$IP" >> $GITHUB_OUTPUT
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
          
      - name: Update ips.txt
        run: |
          echo "${{ steps.extract.outputs.timestamp }} - ${{ steps.extract.outputs.ip }}" >> ips.txt
          
      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ips.txt
          git commit -m "Add IP log"
          git push
          
      - name: Close issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
